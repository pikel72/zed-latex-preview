id = "latex-preview"
name = "LaTeX Preview (Math Hover)"
version = "0.1.0"
schema_version = 1
authors = ["Pikel"]
description = """Companion extension that renders LaTeX math formulas as SVG \
images in hover tooltips. Works alongside the official LaTeX extension for \
completions and diagnostics. Uses a Rust native language server."""
repository = "https://github.com/pikel72/zed-latex-preview"

[language_servers.latex-preview]
name = "LaTeX Preview (Math Hover)"
languages = ["LaTeX"]
