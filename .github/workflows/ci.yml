# GitHub Actions CI for latex-preview
#
# Single matrix job: build `latex-preview-lsp` (the Rust native LSP) and run
# the full test suite (unit + LSP integration) on every platform we ship a
# binary for.  Artifacts are uploaded per OS so the extension release process
# can pick them up.
#
# The legacy Node LSP is no longer on the runtime path (see
# docs/rust-primary-refactor-plan.md) and is deleted by Phase 7.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: latex-preview-lsp
          - os: macos-13
            binary: latex-preview-lsp
          - os: windows-latest
            binary: latex-preview-lsp.exe
        # macos-13 pins the x64 image.  Earlier cutover notes flagged
        # intermittent arm64 runner hangs; pinning keeps CI green while
        # the new LSP integration suite (which spawns its own processes
        # via direct pipe reads, no libtest output capture) stabilises
        # on arm64.  Revisit once macos-latest is green.
    defaults:
      run:
        working-directory: latex-index

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            latex-index/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('latex-index/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo build --release
        run: cargo build --release --bin latex-preview-lsp --locked

      - name: cargo test (unit + integration)
        # --nocapture + serial threads keeps the LSP integration suite
        # stable across Linux + macOS x64.  The integration tests spawn
        # their own child processes with direct pipe reads, so libtest's
        # output capture does not deadlock them — but serial execution
        # avoids port contention when multiple LSPs try to bind stdio.
        run: cargo test --bin latex-preview-lsp --locked -- --nocapture --test-threads=1

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: latex-preview-lsp-${{ matrix.os }}
          path: latex-index/target/release/${{ matrix.binary }}
          if-no-files-found: error